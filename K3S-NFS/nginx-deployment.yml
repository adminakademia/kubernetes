apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
          - containerPort: 80
        volumeMounts:
          - name: wolumin1
            mountPath: /usr/share/nginx/html
      volumes:
      - name: wolumin1
        persistentVolumeClaim:
          claimName: nfs

